<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>가계부 — Atelier</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #f8faff;
    color: #1e293b;
    padding-bottom: 80px;
  }
  header {
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header .back {
    background: #f1f5f9;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #475569;
    cursor: pointer;
  }
  header h1 { font-size: 17px; font-weight: 700; flex: 1; }
  header .month-nav { display: flex; gap: 4px; align-items: center; font-size: 13px; }
  header .month-nav button {
    background: #f1f5f9; border: none; width: 30px; height: 30px;
    border-radius: 8px; font-size: 14px; font-weight: 700; color: #475569;
  }
  header .month-nav span { padding: 0 8px; font-weight: 700; color: #1e293b; }

  .container { padding: 16px; }

  .loading { text-align: center; padding: 40px 16px; color: #94a3b8; font-size: 13px; }
  .error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; padding: 12px; border-radius: 12px; font-size: 12px; }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .kpi-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 12px;
  }
  .kpi-card .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .kpi-card .value { font-size: 17px; font-weight: 800; letter-spacing: -0.01em; }
  .kpi-card.income { background: #ecfdf5; border-color: #a7f3d0; }
  .kpi-card.income .label { color: #15803d; }
  .kpi-card.income .value { color: #14532d; }
  .kpi-card.expense { background: #fef2f2; border-color: #fecaca; }
  .kpi-card.expense .label { color: #b91c1c; }
  .kpi-card.expense .value { color: #7f1d1d; }
  .kpi-card.saving { background: #eff6ff; border-color: #bfdbfe; }
  .kpi-card.saving .label { color: #1d4ed8; }
  .kpi-card.saving .value { color: #1e3a8a; }
  .kpi-card.net { background: #faf5ff; border-color: #e9d5ff; }
  .kpi-card.net .label { color: #7c3aed; }
  .kpi-card.net .value { color: #3b0764; }
  .kpi-card.net .value.negative { color: #b91c1c; }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-title .count { font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: none; }

  .tx-list { display: flex; flex-direction: column; gap: 6px; }
  .tx-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .tx-card:active { background: #f8fafc; }
  .tx-card .left { flex: 1; min-width: 0; }
  .tx-card .meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .tx-card .date { font-size: 10px; color: #94a3b8; font-family: ui-monospace, monospace; font-weight: 600; }
  .tx-card .cat {
    font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 700;
    background: #ede9fe; color: #6d28d9;
  }
  .tx-card .desc { font-size: 13px; font-weight: 600; color: #334155; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tx-card .pm { font-size: 10px; color: #94a3b8; margin-top: 2px; }
  .tx-card .amount { font-size: 14px; font-weight: 800; flex-shrink: 0; }
  .tx-card .amount.income { color: #16a34a; }
  .tx-card .amount.expense { color: #1e293b; }

  .empty { text-align: center; padding: 40px 16px; color: #94a3b8; font-size: 13px; }

  .fab {
    position: fixed;
    bottom: 24px;
    right: 16px;
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    color: #fff;
    font-size: 28px;
    font-weight: 300;
    border: none;
    box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
    cursor: pointer;
    z-index: 20;
  }
  .fab:active { transform: scale(0.95); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    display: none;
    align-items: flex-end;
    z-index: 50;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff;
    width: 100%;
    max-height: 92vh;
    border-radius: 24px 24px 0 0;
    padding: 20px;
    overflow-y: auto;
    animation: slideUp 0.2s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal label { display: block; font-size: 11px; font-weight: 700; color: #475569; margin-bottom: 6px; margin-top: 12px; }
  .modal input, .modal select {
    width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1;
    border-radius: 10px; font-size: 14px; font-family: inherit; outline: none;
    background: #fff;
  }
  .modal input:focus, .modal select:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
  .modal .actions { display: flex; gap: 8px; margin-top: 20px; }
  .modal .btn-primary {
    flex: 1; padding: 12px; background: #7c3aed; color: #fff;
    border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .modal .btn-cancel {
    padding: 12px 16px; background: #f1f5f9; color: #475569;
    border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .modal .btn-delete {
    padding: 12px; background: #fef2f2; color: #b91c1c;
    border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .modal .err { background: #fef2f2; color: #b91c1c; padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 12px; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

</head>
<body>

<header>
  <button class="back" onclick="goBack()" aria-label="뒤로">←</button>
  <h1>가계부 (모바일)</h1>
  <div class="month-nav">
    <button onclick="prevMonth()">‹</button>
    <span id="month-label">2026.5</span>
    <button onclick="nextMonth()">›</button>
  </div>
</header>

<div class="container">
  <div id="status" class="loading">불러오는 중...</div>
  <div id="content" style="display:none">
    <div class="kpi-grid">
      <div class="kpi-card income">
        <div class="label">수입</div>
        <div class="value" id="kpi-income">₩0</div>
      </div>
      <div class="kpi-card expense">
        <div class="label">지출</div>
        <div class="value" id="kpi-expense">₩0</div>
      </div>
      <div class="kpi-card saving">
        <div class="label">저축</div>
        <div class="value" id="kpi-saving">₩0</div>
      </div>
      <div class="kpi-card net">
        <div class="label">순익</div>
        <div class="value" id="kpi-net">₩0</div>
      </div>
    </div>

    <div class="section-title">
      <span>거래 내역</span>
      <span class="count" id="tx-count">0건</span>
    </div>
    <div class="tx-list" id="tx-list"></div>
  </div>
</div>

<button class="fab" onclick="openModal()" aria-label="거래 추가">+</button>

<!-- Modal -->
<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modal-title">거래 추가</h2>
    <label>날짜</label>
    <input type="date" id="m-date">
    <label>대분류</label>
    <select id="m-major" onchange="updateMinor()"></select>
    <label>소분류</label>
    <select id="m-minor"></select>
    <label>금액 (원)</label>
    <input type="text" id="m-amount" inputmode="numeric" placeholder="0">
    <label>결제수단</label>
    <select id="m-pm"></select>
    <label>세부사항</label>
    <input type="text" id="m-detail" placeholder="예: 점심, 카페">
    <label>비고</label>
    <input type="text" id="m-note">
    <div id="m-err" class="err" style="display:none"></div>
    <div class="actions">
      <button id="m-del-btn" class="btn-delete" onclick="deleteTx()" style="display:none">🗑</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="saveTx()">저장</button>
    </div>
  </div>
</div>

<script>
let _state = {
  data: {},
  year: new Date().getFullYear(),
  month: new Date().getMonth() + 1,
  editingTx: null
};

function fmtKRW(n) { return '₩' + Math.abs(n || 0).toLocaleString('ko-KR'); }
function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function monthKey() {
  return _state.year + '-' + String(_state.month).padStart(2,'0');
}

function isExpense(t) {
  return t['대분류'] !== '수입' && t['대분류'] !== '저축';
}

function goBack() {
  window.location.href = './';
}

// Auth + Load
auth.onAuthStateChanged(async (user) => {
  if (!user || user.email !== ALLOWED_EMAIL) {
    document.getElementById('status').textContent = '로그인이 필요해요. 메인 사이트에서 로그인 후 다시 오세요.';
    setTimeout(() => goBack(), 2000);
    return;
  }
  await loadData();
});

async function loadData() {
  try {
    document.getElementById('status').textContent = '데이터 불러오는 중...';

    // 1) 즉시 localStorage에서 (이미 메인 사이트에서 캐시됐을 가능성)
    try {
      const cached = localStorage.getItem('atelier_ledger_transactions');
      const settings = localStorage.getItem('atelier_ledger_settings');
      const cats = localStorage.getItem('atelier_ledger_categories');
      if (cached && settings && cats) {
        _state.data.transactions = JSON.parse(cached);
        _state.data.settings = JSON.parse(settings);
        _state.data.categories = JSON.parse(cats);
        console.log('[m-ledger] localStorage hit, tx=' + _state.data.transactions.length);
        render();
      }
    } catch(e) {}

    // 2) Firebase에서 메타 (가벼움 — archived 모드면 ~50KB)
    const mainDoc = await db.collection('appSettings').doc('ledgerData').get();
    if (!mainDoc.exists) {
      document.getElementById('status').textContent = '데이터 없어요. 메인 사이트에서 한 번 입력해보세요.';
      return;
    }
    const d = mainDoc.data();
    _state.data.settings = d.settings || {};
    _state.data.categories = d.categories || {};
    _state.data.budgets = d.budgets || {};
    _state.data.recurring = d.recurring || [];

    const isArchived = !!d.archived;

    if (isArchived) {
      // 3a) Sharded — 현재 연도만 즉시
      const yearDoc = await db.collection('ledgerTransactions').doc(String(_state.year)).get();
      const yearTxs = yearDoc.exists ? (yearDoc.data().items || []) : [];
      _state.data.transactions = yearTxs;
      console.log('[m-ledger] archived load, year ' + _state.year + ' tx=' + yearTxs.length);
      render();

      // 다른 연도 백그라운드
      setTimeout(async () => {
        const all = [...yearTxs];
        const snapshot = await db.collection('ledgerTransactions').get();
        snapshot.forEach((doc) => {
          if (doc.id === String(_state.year)) return;
          all.push(...(doc.data().items || []));
        });
        _state.data.transactions = all;
        try { localStorage.setItem('atelier_ledger_transactions', JSON.stringify(all)); } catch(e) {}
        console.log('[m-ledger] background load complete, total=' + all.length);
        render();
      }, 2000);
    } else {
      // 3b) Legacy — main 문서에 트랜잭션 있음
      _state.data.transactions = d.transactions || [];
      console.log('[m-ledger] legacy load, tx=' + _state.data.transactions.length);
      try { localStorage.setItem('atelier_ledger_transactions', JSON.stringify(_state.data.transactions)); } catch(e) {}
      render();
    }

    // localStorage 갱신
    try {
      localStorage.setItem('atelier_ledger_settings', JSON.stringify(_state.data.settings));
      localStorage.setItem('atelier_ledger_categories', JSON.stringify(_state.data.categories));
    } catch(e) {}
  } catch(e) {
    console.error('[m-ledger] load error:', e);
    document.getElementById('status').innerHTML = '<div class="error">로드 실패: ' + (e.message || e) + '</div>';
  }
}

function render() {
  const txs = _state.data.transactions || [];
  const key = monthKey();
  const monthTxs = txs.filter(t => t.date && t.date.substring(0,7) === key);

  // KPI
  let inc = 0, exp = 0, sav = 0;
  monthTxs.forEach(t => {
    const amt = t['금액'] || 0;
    if (t['대분류'] === '수입') inc += amt;
    else if (t['대분류'] === '저축') sav += amt;
    else exp += amt;
  });
  const net = inc - exp - sav;
  document.getElementById('kpi-income').textContent = fmtKRW(inc);
  document.getElementById('kpi-expense').textContent = fmtKRW(exp);
  document.getElementById('kpi-saving').textContent = fmtKRW(sav);
  const netEl = document.getElementById('kpi-net');
  netEl.textContent = (net < 0 ? '-' : '') + fmtKRW(net);
  netEl.classList.toggle('negative', net < 0);

  // 거래 리스트 (최근 50개)
  document.getElementById('tx-count').textContent = monthTxs.length + '건';
  const sorted = [...monthTxs].sort((a,b) => (b.date||'').localeCompare(a.date||'')).slice(0, 50);
  const list = document.getElementById('tx-list');
  if (sorted.length === 0) {
    list.innerHTML = '<div class="empty">이번 달 거래 없음</div>';
  } else {
    list.innerHTML = sorted.map(t => {
      const isInc = t['대분류'] === '수입';
      const dateStr = (t.date||'').substring(5).replace('-','/');
      return '<div class="tx-card" onclick="editTx(\'' + (t.id||'').replace(/'/g,'\\\'') + '\')">' +
        '<div class="left">' +
          '<div class="meta">' +
            '<span class="date">' + dateStr + '</span>' +
            '<span class="cat">' + (t['소분류'] || t['대분류'] || '') + '</span>' +
          '</div>' +
          '<div class="desc">' + (t['세부사항'] || t['비고'] || '—') + '</div>' +
          (t['결제수단'] ? '<div class="pm">' + t['결제수단'] + '</div>' : '') +
        '</div>' +
        '<div class="amount ' + (isInc ? 'income' : 'expense') + '">' + (isInc ? '+' : '') + fmtKRW(t['금액']||0) + '</div>' +
      '</div>';
    }).join('');
  }

  document.getElementById('status').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  updateMonthLabel();
}

function updateMonthLabel() {
  document.getElementById('month-label').textContent = _state.year + '.' + _state.month;
}

function prevMonth() {
  _state.month--;
  if (_state.month < 1) { _state.month = 12; _state.year--; }
  render();
}
function nextMonth() {
  _state.month++;
  if (_state.month > 12) { _state.month = 1; _state.year++; }
  render();
}

// Modal — Add/Edit
function openModal() {
  _state.editingTx = null;
  document.getElementById('modal-title').textContent = '거래 추가';
  document.getElementById('m-del-btn').style.display = 'none';
  document.getElementById('m-date').value = todayKey();
  populateCategories();
  populatePMs();
  document.getElementById('m-major').value = '';
  document.getElementById('m-minor').innerHTML = '<option value="">선택</option>';
  document.getElementById('m-amount').value = '';
  document.getElementById('m-pm').value = '';
  document.getElementById('m-detail').value = '';
  document.getElementById('m-note').value = '';
  document.getElementById('m-err').style.display = 'none';
  document.getElementById('modal-bg').classList.add('open');
}

function editTx(id) {
  const tx = (_state.data.transactions || []).find(t => t.id === id);
  if (!tx) return;
  _state.editingTx = tx;
  document.getElementById('modal-title').textContent = '거래 편집';
  document.getElementById('m-del-btn').style.display = 'block';
  document.getElementById('m-date').value = tx.date || todayKey();
  populateCategories();
  populatePMs();
  document.getElementById('m-major').value = tx['대분류'] || '';
  updateMinor();
  document.getElementById('m-minor').value = tx['소분류'] || '';
  document.getElementById('m-amount').value = (tx['금액'] || 0).toLocaleString('ko-KR');
  document.getElementById('m-pm').value = tx['결제수단'] || '';
  document.getElementById('m-detail').value = tx['세부사항'] || '';
  document.getElementById('m-note').value = tx['비고'] || '';
  document.getElementById('m-err').style.display = 'none';
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}
function closeModalBg(e) {
  if (e.target.id === 'modal-bg') closeModal();
}

function populateCategories() {
  const cats = _state.data.categories || {};
  const sel = document.getElementById('m-major');
  sel.innerHTML = '<option value="">선택</option>' +
    Object.keys(cats).map(c => '<option value="' + c + '">' + c + '</option>').join('');
}
function updateMinor() {
  const major = document.getElementById('m-major').value;
  const cats = _state.data.categories || {};
  const subs = cats[major] || [];
  document.getElementById('m-minor').innerHTML = '<option value="">선택</option>' +
    subs.map(s => '<option value="' + s + '">' + s + '</option>').join('');
}
function populatePMs() {
  const all = (_state.data.settings?.paymentMethods) || [];
  const disabled = (_state.data.settings?.disabledPayments) || [];
  const pms = all.filter(p => !disabled.includes(p));
  document.getElementById('m-pm').innerHTML = '<option value="">선택</option>' +
    pms.map(p => '<option value="' + p + '">' + p + '</option>').join('');
}

document.getElementById('m-amount').addEventListener('input', (e) => {
  const raw = e.target.value.replace(/[^0-9]/g, '');
  e.target.value = raw ? parseInt(raw).toLocaleString('ko-KR') : '';
});

async function saveTx() {
  const date = document.getElementById('m-date').value;
  const major = document.getElementById('m-major').value;
  const minor = document.getElementById('m-minor').value;
  const amount = parseInt(document.getElementById('m-amount').value.replace(/,/g, '')) || 0;
  const pm = document.getElementById('m-pm').value;
  const detail = document.getElementById('m-detail').value;
  const note = document.getElementById('m-note').value;

  const errEl = document.getElementById('m-err');
  errEl.style.display = 'none';

  if (!date) { errEl.textContent = '날짜 입력'; errEl.style.display = 'block'; return; }
  if (!major) { errEl.textContent = '대분류 선택'; errEl.style.display = 'block'; return; }
  if (amount <= 0) { errEl.textContent = '금액 입력'; errEl.style.display = 'block'; return; }

  const tx = _state.editingTx || {};
  if (!tx.id) tx.id = 'txn_m_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  tx.date = date;
  tx['대분류'] = major;
  tx['소분류'] = minor;
  tx['금액'] = amount;
  tx['결제수단'] = pm;
  tx['세부사항'] = detail;
  tx['비고'] = note;

  try {
    // 메모리 업데이트
    const idx = (_state.data.transactions || []).findIndex(t => t.id === tx.id);
    if (idx >= 0) _state.data.transactions[idx] = tx;
    else _state.data.transactions.unshift(tx);

    // Firebase 저장 (archived 모드면 sharded, 아니면 main)
    const mainDoc = await db.collection('appSettings').doc('ledgerData').get();
    const isArchived = mainDoc.exists && !!mainDoc.data().archived;

    if (isArchived) {
      const year = date.substring(0,4);
      const yearDoc = await db.collection('ledgerTransactions').doc(year).get();
      const items = yearDoc.exists ? (yearDoc.data().items || []) : [];
      const yIdx = items.findIndex(t => t.id === tx.id);
      if (yIdx >= 0) items[yIdx] = tx;
      else items.unshift(tx);
      await db.collection('ledgerTransactions').doc(year).set({
        items: items, count: items.length, updatedAt: new Date().toISOString()
      });
    } else {
      // legacy 모드: 전체 트랜잭션 main에 저장
      await db.collection('appSettings').doc('ledgerData').set({
        transactions: _state.data.transactions,
        updatedAt: new Date().toISOString()
      }, { merge: true });
    }

    // localStorage 갱신
    try { localStorage.setItem('atelier_ledger_transactions', JSON.stringify(_state.data.transactions)); } catch(e) {}

    closeModal();
    render();
  } catch(e) {
    errEl.textContent = '저장 실패: ' + (e.message || e);
    errEl.style.display = 'block';
  }
}

async function deleteTx() {
  if (!_state.editingTx) return;
  if (!confirm('이 거래를 삭제할까요?')) return;
  const tx = _state.editingTx;
  try {
    _state.data.transactions = _state.data.transactions.filter(t => t.id !== tx.id);

    const mainDoc = await db.collection('appSettings').doc('ledgerData').get();
    const isArchived = mainDoc.exists && !!mainDoc.data().archived;

    if (isArchived) {
      const year = (tx.date || '').substring(0,4);
      const yearDoc = await db.collection('ledgerTransactions').doc(year).get();
      const items = (yearDoc.exists ? yearDoc.data().items : []).filter(t => t.id !== tx.id);
      await db.collection('ledgerTransactions').doc(year).set({
        items: items, count: items.length, updatedAt: new Date().toISOString()
      });
    } else {
      await db.collection('appSettings').doc('ledgerData').set({
        transactions: _state.data.transactions,
        updatedAt: new Date().toISOString()
      }, { merge: true });
    }

    try { localStorage.setItem('atelier_ledger_transactions', JSON.stringify(_state.data.transactions)); } catch(e) {}

    closeModal();
    render();
  } catch(e) {
    document.getElementById('m-err').textContent = '삭제 실패: ' + (e.message || e);
    document.getElementById('m-err').style.display = 'block';
  }
}
