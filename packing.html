  <script>
    // ===== Firebase Helpers =====
    async function fbRead(col) {
      const snap = await db.collection(col).get();
      return snap.docs.map(function(d) { var data = d.data(); data._id = d.id; return data; });
    }
    async function fbAdd(col, obj) {
      obj._createdAt = firebase.firestore.FieldValue.serverTimestamp();
      const ref = await db.collection(col).add(obj);
      obj._id = ref.id;
      return obj;
    }
    async function fbUpdate(col, id, obj) {
      await db.collection(col).doc(id).update(obj);
    }
    async function fbDelete(col, id) {
      await db.collection(col).doc(id).delete();
    }

    // ===== State =====
    var tripsData = [];
    var packingData = [];
    var citiesData = [];
    var journeyData = [];
    var currentTripId = null;
    var _catIcon = 'star';
    var _itemCatIndex = null;
    var weatherCache = {}; // city -> {temp, icon, desc}

    // Icon options for picker
    var ICONS = ['star','checkroom','devices','spa','luggage','flight','restaurant','shopping_bag','medication','photo_camera','fitness_center','headphones','book','brush','music_note','sports_esports','local_cafe','beach_access'];

    // ===== Init =====
    document.addEventListener('DOMContentLoaded', async function() {
      renderIconPicker();
      try {
        tripsData = await fbRead('trips');
        renderTripSelector();
        if (tripsData.length > 0) {
          // Select first trip by default
          document.getElementById('trip-selector').value = tripsData[0]._id;
          await onTripSelect(tripsData[0]._id);
        } else {
          document.getElementById('empty-state').style.display = 'flex';
        }
      } catch(err) {
        console.error('Init error:', err);
      }
    });

    // ===== Trip Selector =====
    function renderTripSelector() {
      var sel = document.getElementById('trip-selector');
      sel.innerHTML = '<option value="">여행 선택...</option>' +
        tripsData.map(function(t) {
          return '<option value="' + t._id + '">' + t.name + '</option>';
        }).join('');
    }

    async function onTripSelect(tripId) {
      if (!tripId) {
        currentTripId = null;
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('empty-state').style.display = 'flex';
        return;
      }
      currentTripId = tripId;
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('main-content').style.display = 'grid';

      // Load all data in parallel
      var [packingDocs, journeyDocs, cityDocs] = await Promise.all([
        fbRead('packing'),
        fbRead('journey'),
        fbRead('trip_cities')
      ]);

      packingData = packingDocs.filter(function(d) { return d.trip_id === tripId; });
      journeyData = journeyDocs.filter(function(d) { return d.trip_id === tripId; });
      citiesData = cityDocs.filter(function(d) { return d.trip_id === tripId; });
      citiesData.sort(function(a, b) { return (a.start_date || '').localeCompare(b.start_date || ''); });

      renderProgress();
      renderCategories();
      renderDailyPlanner();
    }

    // ===== Progress =====
    function renderProgress() {
      var total = 0, checked = 0;
      packingData.forEach(function(cat) {
        (cat.items || []).forEach(function(it) { total++; if (it.checked) checked++; });
      });
      var pct = total > 0 ? Math.round(checked / total * 100) : 0;
      document.getElementById('progress-pct').innerHTML = pct + '% <span class="text-lg font-medium text-outline">Complete</span>';
      document.getElementById('progress-count').textContent = checked + ' of ' + total + ' items packed';
      document.getElementById('progress-bar').style.width = pct + '%';
    }

    // ===== Category Checklists (Right Column) =====
    function renderCategories() {
      var container = document.getElementById('category-list');
      if (packingData.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-sm text-outline opacity-60">카테고리를 추가해서 패킹 리스트를 시작해봐!</div>';
        return;
      }
      container.innerHTML = packingData.map(function(cat, ci) {
        var items = cat.items || [];
        var done = items.filter(function(it) { return it.checked; }).length;
        return '<div class="bg-surface-container-low rounded-3xl p-6 card-shadow transition-all fade-in">' +
          '<div class="flex justify-between items-center mb-5 px-2">' +
            '<div class="flex items-center gap-3">' +
              '<div class="bg-primary/10 p-2 rounded-xl text-primary"><span class="material-symbols-outlined">' + (cat.icon || 'star') + '</span></div>' +
              '<h2 class="text-xl font-bold text-on-surface font-headline">' + cat.category + '</h2>' +
            '</div>' +
            '<div class="flex items-center gap-2">' +
              '<span class="text-xs font-bold bg-surface-container-highest px-3 py-1 rounded-full text-on-surface-variant">' + done + '/' + items.length + '</span>' +
              '<button onclick="deleteCategory(' + ci + ')" class="p-1.5 hover:bg-error-container rounded-lg text-outline hover:text-error transition-colors" title="삭제"><span class="material-symbols-outlined" style="font-size:18px">delete</span></button>' +
            '</div>' +
          '</div>' +
          '<div class="space-y-2.5">' +
            items.map(function(item, ii) {
              var checkedCls = item.checked ? 'line-through opacity-50' : '';
              var bgCls = item.checked ? 'bg-primary-fixed-dim' : 'bg-surface-container-highest';
              return '<label class="flex items-center gap-4 bg-surface-container-lowest p-4 rounded-2xl cursor-pointer hover:bg-white/60 transition-all group shadow-sm">' +
                '<input type="checkbox" ' + (item.checked ? 'checked' : '') + ' onchange="toggleItem(' + ci + ',' + ii + ',this.checked)" class="w-6 h-6 rounded-lg border-none ' + bgCls + ' text-primary focus:ring-0 cursor-pointer"/>' +
                '<span class="flex-1 text-on-surface font-medium ' + checkedCls + '">' + item.name + '</span>' +
                '<button onclick="event.preventDefault();deleteItem(' + ci + ',' + ii + ')" class="p-1 hover:bg-error-container rounded-lg text-outline/40 hover:text-error opacity-0 group-hover:opacity-100 transition-all" title="삭제"><span class="material-symbols-outlined" style="font-size:16px">close</span></button>' +
              '</label>';
            }).join('') +
          '</div>' +
          '<button onclick="openItemModal(' + ci + ')" class="mt-4 w-full py-3 border-2 border-dashed border-outline-variant/20 rounded-2xl text-xs font-bold text-outline hover:border-primary/30 hover:text-primary transition-all flex items-center justify-center gap-1">' +
            '<span class="material-symbols-outlined" style="font-size:16px">add</span> 아이템 추가' +
          '</button>' +
        '</div>';
      }).join('');
    }

    // ===== Daily Outfit Planner (Left Column) =====
    async function renderDailyPlanner() {
      var container = document.getElementById('daily-planner');
      var trip = tripsData.find(function(t) { return t._id === currentTripId; });
      if (!trip || !trip.start_date || !trip.end_date) {
        container.innerHTML = '<div class="text-center py-8 text-sm text-outline opacity-60">여행 날짜가 설정되지 않았습니다.</div>';
        return;
      }

      // Generate date range
      var start = new Date(trip.start_date);
      var end = new Date(trip.end_date);
      var dates = [];
      for (var d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        dates.push(new Date(d));
      }

      if (dates.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-sm text-outline opacity-60">여행 날짜가 없습니다.</div>';
        return;
      }

      // Build city map for each date
      function getCityForDate(date) {
        var dateStr = formatDate(date);
        for (var i = 0; i < citiesData.length; i++) {
          var c = citiesData[i];
          if (c.start_date && c.end_date && dateStr >= c.start_date && dateStr <= c.end_date) {
            return c.name;
          }
        }
        // fallback: check journey data
        var journeyItem = journeyData.find(function(j) { return j.date === dateStr; });
        if (journeyItem && journeyItem.city) return journeyItem.city;
        return citiesData.length > 0 ? citiesData[0].name : '';
      }

      // Get schedule items for a date
      function getScheduleForDate(date) {
        var dateStr = formatDate(date);
        return journeyData.filter(function(j) {
          return j.date === dateStr && (j.type === 'schedule' || j.type === 'activity' || !j.type || j.type === 'sightseeing');
        }).sort(function(a, b) { return (a.time || '').localeCompare(b.time || ''); });
      }

      // Render initial structure, then fetch weather
      var html = '';
      var prevMonth = '';
      dates.forEach(function(date, idx) {
        var city = getCityForDate(date);
        var schedules = getScheduleForDate(date);
        var monthStr = date.toLocaleString('en', { month: 'short' });
        var dayStr = String(date.getDate()).padStart(2, '0');
        var isNewMonth = monthStr !== prevMonth;
        prevMonth = monthStr;

        var scheduleHtml = '';
        if (schedules.length > 0) {
          scheduleHtml = schedules.map(function(s) {
            return '<p class="text-sm font-semibold text-on-surface">' + (s.time ? '<span class="text-xs text-outline mr-1">' + s.time + '</span> ' : '') + (s.title || s.description || '') + '</p>';
          }).join('');
        } else {
          scheduleHtml = '<p class="text-sm text-outline/60 italic">일정 없음</p>';
        }

        html += '<div class="bg-surface-container-lowest rounded-2xl shadow-sm border border-outline-variant/10 hover:border-primary/20 transition-all p-4 md:p-5">' +
          '<div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-center">' +
            '<div class="col-span-1 text-center md:text-left' + (idx > 0 && !isNewMonth ? '' : '') + '">' +
              '<div class="text-[10px] font-bold text-outline uppercase leading-none mb-1">' + monthStr + '</div>' +
              '<div class="text-xl font-extrabold text-on-surface leading-none">' + dayStr + '</div>' +
            '</div>' +
            '<div class="col-span-2 flex flex-col items-center justify-center" id="weather-' + idx + '">' +
              '<span class="material-symbols-outlined text-outline/30 mb-0.5">cloud</span>' +
              '<span class="text-[11px] font-semibold text-outline">...</span>' +
            '</div>' +
            '<div class="col-span-2">' +
              '<div class="text-sm font-bold text-on-surface">' + (city || '-') + '</div>' +
            '</div>' +
            '<div class="col-span-6">' + scheduleHtml + '</div>' +
            '<div class="col-span-1 flex justify-end">' +
            '</div>' +
          '</div>' +
        '</div>';
      });

      container.innerHTML = html;

      // Fetch weather for each unique city
      var cityDates = {};
      dates.forEach(function(date, idx) {
        var city = getCityForDate(date);
        if (!city) return;
        if (!cityDates[city]) cityDates[city] = [];
        cityDates[city].push({ date: date, idx: idx });
      });

      for (var city in cityDates) {
        fetchWeatherForCity(city, cityDates[city]);
      }
    }

    // Weather from Open-Meteo
    async function fetchWeatherForCity(cityName, dateEntries) {
      try {
        // Geocode city
        var cacheKey = cityName.toLowerCase();
        var coords = null;

        if (weatherCache[cacheKey] && weatherCache[cacheKey].coords) {
          coords = weatherCache[cacheKey].coords;
        } else {
          var geoRes = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(cityName) + '&count=1&language=en');
          var geoData = await geoRes.json();
          if (!geoData.results || geoData.results.length === 0) {
            dateEntries.forEach(function(e) { setWeatherUI(e.idx, null); });
            return;
          }
          coords = { lat: geoData.results[0].latitude, lng: geoData.results[0].longitude };
          if (!weatherCache[cacheKey]) weatherCache[cacheKey] = {};
          weatherCache[cacheKey].coords = coords;
        }

        // Get date range
        var allDates = dateEntries.map(function(e) { return formatDate(e.date); });
        var minDate = allDates.reduce(function(a, b) { return a < b ? a : b; });
        var maxDate = allDates.reduce(function(a, b) { return a > b ? a : b; });

        // Try forecast first (within 16 days), else use historical/climate
        var today = new Date();
        var maxForecastDate = new Date(today);
        maxForecastDate.setDate(maxForecastDate.getDate() + 15);

        var weatherUrl;
        if (new Date(minDate) <= maxForecastDate) {
          weatherUrl = 'https://api.open-meteo.com/v1/forecast?latitude=' + coords.lat + '&longitude=' + coords.lng +
            '&daily=temperature_2m_max,temperature_2m_min,weathercode&start_date=' + minDate + '&end_date=' + maxDate + '&timezone=auto';
        } else {
          // Use climate API for historical averages - approximate with previous year
          var prevYearMin = minDate.replace(/^\d{4}/, String(new Date().getFullYear() - 1));
          var prevYearMax = maxDate.replace(/^\d{4}/, String(new Date().getFullYear() - 1));
          weatherUrl = 'https://archive-api.open-meteo.com/v1/archive?latitude=' + coords.lat + '&longitude=' + coords.lng +
            '&daily=temperature_2m_max,temperature_2m_min,weathercode&start_date=' + prevYearMin + '&end_date=' + prevYearMax + '&timezone=auto';
        }

        var wxRes = await fetch(weatherUrl);
        var wxData = await wxRes.json();

        if (!wxData.daily || !wxData.daily.time) {
          dateEntries.forEach(function(e) { setWeatherUI(e.idx, null); });
          return;
        }

        // Map weather data to dates
        var wxMap = {};
        wxData.daily.time.forEach(function(t, i) {
          wxMap[t] = {
            tempMax: Math.round(wxData.daily.temperature_2m_max[i]),
            tempMin: Math.round(wxData.daily.temperature_2m_min[i]),
            code: wxData.daily.weathercode[i]
          };
        });

        dateEntries.forEach(function(e) {
          var dateStr = formatDate(e.date);
          // If using previous year data, adjust the lookup key
          var lookupDate = dateStr;
          if (!wxMap[dateStr]) {
            lookupDate = dateStr.replace(/^\d{4}/, String(new Date().getFullYear() - 1));
          }
          var wx = wxMap[lookupDate] || wxMap[dateStr];
          if (wx) {
            setWeatherUI(e.idx, wx);
          } else {
            setWeatherUI(e.idx, null);
          }
        });
      } catch (err) {
        console.error('Weather error for ' + cityName + ':', err);
        dateEntries.forEach(function(e) { setWeatherUI(e.idx, null); });
      }
    }

    function setWeatherUI(idx, wx) {
      var el = document.getElementById('weather-' + idx);
      if (!el) return;
      if (!wx) {
        el.innerHTML = '<span class="material-symbols-outlined text-outline/30 mb-0.5">cloud_off</span><span class="text-[11px] font-semibold text-outline">N/A</span>';
        return;
      }
      var info = weatherCodeToInfo(wx.code);
      el.innerHTML = '<span class="material-symbols-outlined ' + info.colorCls + ' mb-0.5">' + info.icon + '</span>' +
        '<span class="text-[11px] font-semibold text-outline">' + wx.tempMax + '°/' + wx.tempMin + '° ' + info.label + '</span>';
    }

    function weatherCodeToInfo(code) {
      // WMO Weather interpretation codes
      if (code === 0) return { icon: 'wb_sunny', label: 'Clear', colorCls: 'text-amber-500' };
      if (code === 1 || code === 2) return { icon: 'partly_cloudy_day', label: 'Partly Cloudy', colorCls: 'text-amber-400' };
      if (code === 3) return { icon: 'cloud', label: 'Overcast', colorCls: 'text-blue-400' };
      if (code >= 45 && code <= 48) return { icon: 'foggy', label: 'Fog', colorCls: 'text-gray-400' };
      if (code >= 51 && code <= 55) return { icon: 'grain', label: 'Drizzle', colorCls: 'text-blue-300' };
      if (code >= 56 && code <= 57) return { icon: 'ac_unit', label: 'Freezing Drizzle', colorCls: 'text-cyan-400' };
      if (code >= 61 && code <= 65) return { icon: 'rainy', label: 'Rain', colorCls: 'text-blue-500' };
      if (code >= 66 && code <= 67) return { icon: 'ac_unit', label: 'Freezing Rain', colorCls: 'text-cyan-500' };
      if (code >= 71 && code <= 77) return { icon: 'ac_unit', label: 'Snow', colorCls: 'text-sky-300' };
      if (code >= 80 && code <= 82) return { icon: 'thunderstorm', label: 'Showers', colorCls: 'text-blue-600' };
      if (code >= 85 && code <= 86) return { icon: 'weather_snowy', label: 'Snow Showers', colorCls: 'text-sky-400' };
      if (code >= 95) return { icon: 'thunderstorm', label: 'Thunderstorm', colorCls: 'text-purple-500' };
      return { icon: 'cloud', label: 'Cloudy', colorCls: 'text-gray-400' };
    }

    // ===== Category Modal =====
    function renderIconPicker() {
      var container = document.getElementById('icon-picker');
      container.innerHTML = ICONS.map(function(icon, i) {
        var cls = i === 0 ? 'p-2 rounded-xl bg-primary/10 text-primary border-2 border-primary/30' : 'p-2 rounded-xl bg-surface-container-low text-outline border-2 border-transparent hover:border-primary/20';
        return '<button type="button" onclick="pickIcon(this,\'' + icon + '\')" class="' + cls + '"><span class="material-symbols-outlined" style="font-size:20px">' + icon + '</span></button>';
      }).join('');
    }

    function pickIcon(btn, icon) {
      _catIcon = icon;
      var btns = document.querySelectorAll('#icon-picker button');
      btns.forEach(function(b) { b.className = 'p-2 rounded-xl bg-surface-container-low text-outline border-2 border-transparent hover:border-primary/20'; });
      btn.className = 'p-2 rounded-xl bg-primary/10 text-primary border-2 border-primary/30';
    }

    function openCategoryModal() {
      document.getElementById('cat-name').value = '';
      _catIcon = 'star';
      renderIconPicker();
      document.getElementById('cat-modal').classList.add('active');
    }

    function closeCategoryModal() {
      document.getElementById('cat-modal').classList.remove('active');
    }

    async function saveCategory() {
      var name = document.getElementById('cat-name').value.trim();
      if (!name) { alert('카테고리명을 입력해줘!'); return; }
      var obj = { trip_id: currentTripId, category: name, icon: _catIcon, items: [] };
      try {
        var saved = await fbAdd('packing', obj);
        packingData.push(saved);
        renderCategories();
        renderProgress();
        closeCategoryModal();
      } catch (err) { alert('저장에 실패했어요.'); console.error(err); }
    }

    async function deleteCategory(ci) {
      if (!confirm('"' + packingData[ci].category + '" 카테고리를 삭제할까요?')) return;
      try {
        await fbDelete('packing', packingData[ci]._id);
        packingData.splice(ci, 1);
        renderCategories();
        renderProgress();
      } catch (err) { alert('삭제에 실패했어요.'); }
    }

    // ===== Item Modal =====
    function openItemModal(ci) {
      _itemCatIndex = ci;
      document.getElementById('item-name').value = '';
      document.getElementById('item-modal-title').textContent = packingData[ci].category + ' — 아이템 추가';
      document.getElementById('item-modal').classList.add('active');
      setTimeout(function() { document.getElementById('item-name').focus(); }, 100);
    }

    function closeItemModal() {
      document.getElementById('item-modal').classList.remove('active');
    }

    async function saveItem() {
      var name = document.getElementById('item-name').value.trim();
      if (!name || _itemCatIndex === null) { alert('아이템명을 입력해줘!'); return; }
      var cat = packingData[_itemCatIndex];
      if (!cat.items) cat.items = [];
      cat.items.push({ name: name, checked: false });
      try {
        await fbUpdate('packing', cat._id, { items: cat.items });
        renderCategories();
        renderProgress();
        closeItemModal();
      } catch (err) { alert('저장에 실패했어요.'); console.error(err); }
    }

    async function toggleItem(ci, ii, checked) {
      packingData[ci].items[ii].checked = checked;
      try {
        await fbUpdate('packing', packingData[ci]._id, { items: packingData[ci].items });
        renderCategories();
        renderProgress();
      } catch (err) { alert('저장에 실패했어요.'); }
    }

    async function deleteItem(ci, ii) {
      if (!confirm('"' + packingData[ci].items[ii].name + '" 아이템을 삭제할까요?')) return;
      packingData[ci].items.splice(ii, 1);
      try {
        await fbUpdate('packing', packingData[ci]._id, { items: packingData[ci].items });
        renderCategories();
        renderProgress();
      } catch (err) { alert('삭제에 실패했어요.'); }
    }

    // ===== Template Import =====
    var PACKING_TEMPLATE = [
      { category: '잠옷/수영복', icon: 'checkroom', items: ['잠옷 1','잠옷 2','잠옷 3','수영복'] },
      { category: '신발', icon: 'steps', items: ['가호 운동화','메쉬 운동화 (신기)'] },
      { category: '가방', icon: 'shopping_bag', items: ['아코크 가방'] },
      { category: '속옷', icon: 'checkroom', items: ['누브라 1개','팬티 8개','양말 8개'] },
      { category: 'ACC', icon: 'star', items: ['어나더 향수','제이에스티나 귀걸이 / 이어커프','머리빗','봉 고데기'] },
      { category: '세면도구', icon: 'spa', items: ['헤어밴드','치약 & 칫솔','샤워볼','바디워시 / 샴푸 / 린스','클렌징폼 / 아이리무버 + 솜','스킨 / 시카이드 크림'] },
      { category: '화장품', icon: 'brush', items: ['헤어 에센스','헤어 스프레이','썬크림','눈 연고 & 머리 약'] },
      { category: '일반 준비물', icon: 'luggage', items: ['휴대용 물티슈','기본 펜 & 네임펜','우산','손톱깎이','책','생리대 (시작 안했으면)','상비약'] },
      { category: '전자제품', icon: 'devices', items: ['아이패드 / 애플워치 / 에어팟','보조배터리','충전기 / 돼지코','eSIM','여러 랜선들'] },
      { category: '항공', icon: 'flight', items: ['여권 / 여권 사본 / 여권 사진','국제운전면허증'] },
      { category: '돈', icon: 'payments', items: ['환전 (캐쉬)','비상용 체크 & 신용카드'] },
      { category: '보험', icon: 'shield', items: ['마이뱅크'] }
    ];

    async function importPackingTemplate() {
      if (!currentTripId) { alert('여행을 먼저 선택해줘!'); return; }
      if (!confirm('기본 패킹 템플릿 (12개 카테고리)을 추가할까요?')) return;
      var btn = document.getElementById('btn-import-template');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined text-2xl mb-1 animate-spin">progress_activity</span><span class="font-semibold text-sm">추가 중...</span>';
      try {
        for (var i = 0; i < PACKING_TEMPLATE.length; i++) {
          var tpl = PACKING_TEMPLATE[i];
          var items = tpl.items.map(function(name) { return { name: name, checked: false }; });
          var obj = { trip_id: currentTripId, category: tpl.category, icon: tpl.icon, items: items };
          var saved = await fbAdd('packing', obj);
          packingData.push(saved);
        }
        renderCategories();
        renderProgress();
        btn.innerHTML = '<span class="material-symbols-outlined text-2xl mb-1 text-emerald-500">check_circle</span><span class="font-semibold text-sm text-emerald-600">추가 완료!</span>';
        setTimeout(function() {
          btn.disabled = false;
          btn.innerHTML = '<span class="material-symbols-outlined text-2xl mb-1 group-hover:scale-110 transition-transform">playlist_add</span><span class="font-semibold text-sm">템플릿 불러오기</span><span class="text-[10px] text-outline mt-0.5">기본 패킹 리스트 한번에 추가</span>';
        }, 2000);
      } catch (err) {
        alert('추가에 실패했어요: ' + err.message);
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined text-2xl mb-1 group-hover:scale-110 transition-transform">playlist_add</span><span class="font-semibold text-sm">템플릿 불러오기</span><span class="text-[10px] text-outline mt-0.5">기본 패킹 리스트 한번에 추가</span>';
        console.error(err);
      }
    }

    // ===== Helpers =====
    function formatDate(d) {
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }
  </script>
