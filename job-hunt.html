<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Overseas Fashion Design Jobs — Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#7c3aed; --ink:#000; --paper:#fff;
    --mut:rgba(0,0,0,.6); --dim:rgba(0,0,0,.4); --faint:rgba(0,0,0,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;background:#fff;color:#000;
    font-family:'Inter','Helvetica','-apple-system',BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    -webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  img.emoji{height:1em;width:1em;margin:0 .06em;vertical-align:-.12em;display:inline-block}
  .wrap{max-width:1152px;margin:0 auto;padding:0 24px}

  section{margin-bottom:88px}
  .sech{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;
    border-bottom:2px solid var(--accent);padding-bottom:14px;margin-bottom:28px}
  .sech h2,.sech h3{font-weight:800;font-style:italic;text-transform:uppercase;margin:0;
    display:flex;align-items:center;gap:14px}
  .sech h2{font-size:1.55rem;letter-spacing:-.01em}
  .sech h3{font-size:2.2rem;letter-spacing:-.01em}
  .sech .cap{font-size:10px;text-transform:uppercase;letter-spacing:.18em;font-weight:700;color:var(--dim);white-space:nowrap}
  .sech .star{color:var(--accent);font-style:normal}
  .sech .cap.norm{font-weight:400;letter-spacing:.2em}

  /* TOP 5 */
  .top5{display:grid;grid-template-columns:repeat(5,1fr);border-left:1px solid #000;border-top:1px solid #000}
  .t5{border-right:1px solid #000;border-bottom:1px solid #000;padding:24px;display:flex;flex-direction:column;justify-content:space-between;min-height:230px}
  .t5 .row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
  .t5 .num{font-size:2.4rem;font-weight:800;line-height:1;color:rgba(0,0,0,.16)}
  .t5.win .num{color:rgba(124,58,237,.22)}
  .t5 .rec{font-size:9px;font-weight:700;color:#fff;background:var(--accent);padding:3px 8px;text-transform:uppercase;letter-spacing:.12em}
  .t5 .tt{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;line-height:1.35;margin-bottom:14px}
  .t5 .ds{font-size:10px;color:rgba(0,0,0,.6);line-height:1.55}

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid #000}
  .stats .st{padding:30px 16px;text-align:center;border-right:1px solid #000}
  .stats .st:last-child{border-right:none}
  .stats .n{font-size:2.3rem;font-weight:800;color:var(--accent);margin-bottom:8px;line-height:1}
  .stats .l{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.16em;font-weight:700;line-height:1.5}

  /* CONTROLS */
  .controls{position:sticky;top:0;z-index:6;background:#fff;padding:14px 0;border-bottom:1px solid rgba(0,0,0,.1);margin-bottom:56px}
  .tabs{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .tab{cursor:pointer;background:#fff;border:1px solid #000;color:#000;padding:9px 18px;
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;transition:.14s}
  .tab:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .ftog{cursor:pointer;background:#fff;border:1px solid #000;padding:9px 16px;font-size:10px;font-weight:700;
    text-transform:uppercase;letter-spacing:.14em;margin-left:6px}
  .ftog.on{background:#000;color:#fff;border-color:#000}
  .legend{display:flex;gap:20px;margin-left:auto;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--dim)}
  .legend span{display:flex;align-items:center;gap:7px}
  .legend i{width:7px;height:7px;display:inline-block}
  .legend i.hi{background:var(--accent)} .legend i.mid{border:1px solid #000} .legend i.lo{border:1px solid rgba(0,0,0,.2)}

  /* INFO + LIVE */
  .info{border:1px solid var(--accent);padding:18px 22px;margin-bottom:34px;font-size:12px;line-height:1.6;color:#000}
  .info .tag{font-weight:700;text-transform:uppercase;color:var(--accent);margin-right:8px;letter-spacing:.08em}
  .info b{font-weight:700}
  .live{display:flex;align-items:center;gap:14px;margin-bottom:30px}
  .live i{width:11px;height:11px;background:var(--accent);display:inline-block}
  .live span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3em;color:var(--accent)}

  /* JOB GRID + CARDS */
  .jgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:44px}
  .jc{display:flex;flex-direction:column;border-top:1px solid #000;padding-top:30px}
  .jc.fit-lo{opacity:.82}
  .jc:hover{opacity:1}
  .jc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:20px}
  .jc-co{font-size:13.5px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;line-height:1.35;color:#000;display:flex;align-items:center;gap:4px}
  .jc-co img.emoji{height:1.5em;width:1.5em;vertical-align:-.35em;margin-left:.1em}
  .fb{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;padding:3px 8px;white-space:nowrap}
  .fb.hi{background:var(--accent);color:#fff}
  .fb.mid{border:1px solid #000;color:#000}
  .fb.lo{border:1px solid rgba(0,0,0,.15);color:rgba(0,0,0,.4)}
  .jc-title{font-size:1.2rem;font-weight:700;line-height:1.3;margin:0 0 6px;transition:color .15s}
  .jc:hover .jc-title{color:var(--accent)}
  .jc-loc{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:20px;font-weight:600}
  .jc-spec{margin:0 0 22px;border-top:1px solid var(--faint);border-bottom:1px solid var(--faint);
    border-left:3px solid var(--accent);background:rgba(124,58,237,.045);
    padding:15px 14px;display:flex;flex-direction:column;gap:9px}
  .jc-spec .sr{display:grid;grid-template-columns:58px 1fr;gap:10px;font-size:11.5px;align-items:baseline}
  .jc-spec dt{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin:0}
  .jc-spec .sr:nth-child(1) dt{color:#0a7d4f}   /* SALARY */
  .jc-spec .sr:nth-child(2) dt{color:#7c3aed}   /* LEVEL */
  .jc-spec .sr:nth-child(3) dt{color:#c2410c}   /* EXP */
  .jc-spec .sr:nth-child(4) dt{color:#2563eb}   /* VISA */
  .jc-spec dd{margin:0;font-weight:600;color:#1a1a1a}
  .jc-spec dd.good{color:#0a7d4f;font-weight:800}
  .jc-spec dd.warn{color:#ba1a1a;font-weight:800}
  .jc-spec dd.pay{color:#0a7d4f;font-weight:800}
  .jc-tags{display:flex;flex-wrap:wrap;gap:7px;margin:auto 0 22px}
  .jc-tags span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;border:1px solid #000;padding:4px 9px}
  .jc-link{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;
    border-bottom:2px solid var(--accent);padding-bottom:4px;align-self:flex-start;transition:.15s}
  .jc:hover .jc-link{background:var(--accent);color:#fff}

  /* FEATURE (purple) */
  .feature{background:var(--accent);color:#fff;padding:34px;margin-top:44px}
  .feature .kicker{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3em;display:block;
    margin-bottom:14px;border-bottom:1px solid rgba(255,255,255,.25);padding-bottom:10px}
  .feature h4{font-size:1.5rem;font-weight:800;font-style:italic;margin:0 0 24px}
  .feature .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .feature .tiles a{border:1px solid rgba(255,255,255,.3);padding:16px;transition:.15s}
  .feature .tiles a:hover{border-color:#fff}
  .feature .tiles .tn{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:7px}
  .feature .tiles .td{font-size:9px;opacity:.65;line-height:1.45}

  /* BOARDS */
  .boards{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid #000;border-left:1px solid #000}
  .bcol{border-right:1px solid #000;border-bottom:1px solid #000;padding:30px}
  .bcol h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;margin:0 0 26px;display:flex;align-items:center;gap:11px;min-height:14px}
  .bcol h4 i{width:8px;height:8px;background:var(--accent);display:inline-block}
  .bcol h4.blank{opacity:0}
  .bcol ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:24px}
  .bcol .bn{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;transition:color .15s;display:block}
  .bcol li a:hover .bn{color:var(--accent)}
  .bcol .spon{font-size:7px;font-weight:700;background:var(--accent);color:#fff;padding:1px 5px;margin-left:6px;letter-spacing:.1em;vertical-align:middle}
  .bcol .bd{font-size:9px;color:var(--dim);margin:7px 0 0;line-height:1.5}

  /* ACTION */
  .action{border:4px solid var(--accent);padding:44px}
  .action h4{font-size:1.4rem;font-weight:800;text-transform:uppercase;margin:0 0 28px;border-bottom:1px solid var(--accent);padding-bottom:16px;display:flex;align-items:center;gap:14px}
  .action ol{list-style:none;margin:0 0 0;padding:0;display:flex;flex-direction:column;gap:20px}
  .action li{display:flex;gap:16px;font-size:12px;font-weight:500;line-height:1.5}
  .action li .ix{font-weight:800;font-size:1.05rem;color:var(--accent);flex:none}
  .action li b{color:#000}
  .action .fine{margin-top:30px;border-top:1px solid rgba(124,58,237,.2);padding-top:22px;font-size:10px;color:var(--dim);line-height:1.7}
  .action .fine b{color:var(--accent);font-weight:700}

  footer.btm{background:#000;color:#fff;padding:60px 0;text-align:center}
  footer.btm .ft{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4em;color:var(--accent);margin-bottom:14px}
  footer.btm .src{font-size:9px;opacity:.4;max-width:560px;margin:0 auto;line-height:1.9;text-transform:uppercase;letter-spacing:.14em;font-weight:300}
  footer.btm .cc{margin-top:34px;font-size:9px;opacity:.25;text-transform:uppercase;letter-spacing:.2em}

  /* GATE / LOADING (shell only) */
  .jh-state{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
  .jh-state .ic{font-size:2.4rem;margin-bottom:18px}
  .jh-state h2{font-weight:800;font-style:italic;text-transform:uppercase;font-size:1.4rem;margin:0 0 10px;letter-spacing:-.01em}
  .jh-state p{font-size:13px;color:var(--mut);max-width:420px;line-height:1.7;margin:0}
  .jh-spin{width:34px;height:34px;border:3px solid rgba(124,58,237,.18);border-top-color:var(--accent);border-radius:50%;animation:jhspin .8s linear infinite}
  @keyframes jhspin{to{transform:rotate(360deg)}}

  @media(max-width:980px){
    .top5{grid-template-columns:repeat(2,1fr)} .stats{grid-template-columns:repeat(2,1fr)}
    .jgrid{grid-template-columns:repeat(2,1fr)} .boards{grid-template-columns:repeat(2,1fr)}
    .feature .tiles{grid-template-columns:repeat(2,1fr)} .sech h3{font-size:1.7rem}
  }
  @media(max-width:560px){
    .top5,.stats,.jgrid,.boards,.feature .tiles{grid-template-columns:1fr}
    .sech .cap{display:none} .legend{display:none}
  }
</style>
</head>
<body>

<!-- 데이터는 이 파일에 없음 — 로그인(최누리 계정) 후 Firestore에서 불러옴 -->
<div id="jh-loading" class="jh-state"><div class="jh-spin"></div></div>
<div id="jh-gate" class="jh-state" style="display:none">
  <div class="ic">🔒</div>
  <h2>Access Restricted</h2>
  <p>이 대시보드는 <b>최누리 계정으로 로그인</b>해야 볼 수 있어요. 아뜰리에에 로그인한 상태에서 열어주세요.</p>
</div>
<div id="jh-error" class="jh-state" style="display:none">
  <div class="ic">⚠️</div>
  <h2>Load Error</h2>
  <p id="jh-error-msg">데이터를 불러오지 못했어요.</p>
</div>
<div id="jh-mount" style="display:none"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCdVHmS40id2qOMm6sYdHp9I4loW22lgaQ",
    authDomain: "the-atelier-99b8c.firebaseapp.com",
    projectId: "the-atelier-99b8c",
    databaseURL: "https://the-atelier-99b8c-default-rtdb.firebaseio.com",
    storageBucket: "the-atelier-99b8c.firebasestorage.app",
    messagingSenderId: "820580020945",
    appId: "1:820580020945:web:d8d8d284e9e21e83eccbf0"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();
  const ALLOWED_EMAIL = 'nury6942@gmail.com';

  function show(id){ ['jh-loading','jh-gate','jh-error','jh-mount'].forEach(function(x){
    document.getElementById(x).style.display = (x===id) ? (x==='jh-mount'?'block':'flex') : 'none';
  }); }

  // 주입된 콘텐츠에 필터(탭/하이핏) 연결
  function jhWire(){
    var tabs=document.getElementById('tabs');
    var secs=document.querySelectorAll('section[data-r]');
    var hionly=document.getElementById('hionly');
    if(!tabs) return;
    var curF='all', hi=false;
    function apply(){
      secs.forEach(function(s){
        var showSec=(curF==='all')||(s.getAttribute('data-r')===curF);
        s.style.display=showSec?'':'none';
        s.querySelectorAll('.jc').forEach(function(c){
          c.style.display=(showSec&&hi&&c.getAttribute('data-fit')!=='hi')?'none':'';
        });
      });
    }
    tabs.addEventListener('click',function(e){
      var t=e.target.closest('.tab'); if(!t)return;
      tabs.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')});
      t.classList.add('on'); curF=t.getAttribute('data-f'); apply();
      window.scrollTo({top:0,behavior:'smooth'});
    });
    if(hionly) hionly.addEventListener('click',function(){ hi=!hi; hionly.classList.toggle('on',hi); apply(); });
  }

  function jhRender(html){
    var m=document.getElementById('jh-mount');
    m.innerHTML=html;
    show('jh-mount');
    jhWire();
    if(window.twemoji) twemoji.parse(m,{folder:'svg',ext:'.svg',base:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/'});
  }

  auth.onAuthStateChanged(async function(user){
    if(!user || user.email !== ALLOWED_EMAIL){ show('jh-gate'); return; }
    try{
      var snap = await db.ref('jobHuntData/html').get();
      if(!snap.exists() || !snap.val()){
        document.getElementById('jh-error-msg').textContent='아직 데이터가 없어요. (업로드 필요)';
        show('jh-error'); return;
      }
      jhRender(snap.val());
    }catch(e){
      document.getElementById('jh-error-msg').textContent='불러오기 실패: '+(e && e.message ? e.message : e);
      show('jh-error');
    }
  });
</script>
</body>
</html>
